<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MzansiSwap - Login / Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>MzansiSwap</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="browse.html">Browse</a>
      <a href="post-item.html">Post Item</a>
      <a href="auth.html">Login/Register</a>
    </nav>
  </header>

  <div class="container auth-wrapper">
    <div class="card">
      <h2 class="section-title">Welcome to MzansiSwap</h2>
      <p style="margin-bottom: 20px; color: #6b7280;">
        Login to manage listings or create a new account to start selling.
      </p>

      <div class="tabs">
        <button class="tab-btn active" id="loginTab">Login</button>
        <button class="tab-btn" id="registerTab">Register</button>
      </div>

      <!-- LOGIN -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group" style="margin-bottom: 15px;">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>

      <!-- REGISTER -->
      <form id="registerForm" class="auth-form">
        <div class="form-group" style="margin-bottom: 15px;">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your full name" required />
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
          <label>Phone Number</label>
          <input type="tel" placeholder="Enter your phone number" required />
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
          <label>Password</label>
          <input type="password" placeholder="Create password" required />
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm password" required />
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>
    </div>
  </div>

  <footer>
    <p>© 2026 MzansiSwap — Login or create your seller account</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
